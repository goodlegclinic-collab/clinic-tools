<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>發票名目產生器</title>
<style>
:root{
  --bg:#f6f5f2; --card:#ffffff; --border:#e2e0da; --text:#2c2c2a;
  --muted:#6b6a64; --hint:#9a9890; --accent:#0f6e56; --danger:#a32d2d; --warn:#854f0b;
}
*{box-sizing:border-box}
body{margin:0; background:var(--bg); color:var(--text); font-family:"PingFang TC","Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif; font-size:16px; line-height:1.6;}
.wrap{max-width:960px; margin:0 auto; padding:20px 16px 48px;}
h1{font-size:22px; font-weight:600; margin:8px 0 16px;}
.step{background:#ecebe6; border-radius:12px; padding:12px 16px; margin:0 0 12px;}
.step p{margin:0}
.step .t{font-size:15px; font-weight:600;}
.step .d{font-size:13px; color:var(--muted);}
.steprow{display:flex; align-items:center; gap:12px; flex-wrap:wrap;}
.steprow>div{flex:1; min-width:200px;}
textarea,input,select,button{font-family:inherit; font-size:15px; color:var(--text);}
textarea,input[type=text],input[type=tel],input[type=number],input[type=date],select{
  width:100%; padding:9px 12px; border:1px solid var(--border); border-radius:8px; background:var(--card); outline:none;
}
textarea:focus,input:focus,select:focus{border-color:var(--accent); box-shadow:0 0 0 2px rgba(15,110,86,.12);}
textarea{resize:vertical;}
button{padding:9px 16px; border:1px solid var(--border); border-radius:8px; background:var(--card); cursor:pointer;}
button:hover{background:#f0efe9;}
button:active{transform:scale(.98);}
button.primary{background:var(--accent); border-color:var(--accent); color:#fff;}
button.primary:hover{background:#0c5a47;}
label{font-size:13px; color:var(--muted); display:block; margin:0 0 4px;}
.field{margin:0 0 14px;}
.grid{display:grid; grid-template-columns:1fr 1fr; gap:20px;}
@media (max-width:720px){.grid{grid-template-columns:1fr}}
.card{background:var(--card); border:1px solid var(--border); border-radius:12px; padding:16px 20px; align-self:start;}
.card h2{font-size:16px; font-weight:600; margin:0 0 10px;}
.card table{width:100%; font-size:14px; border-collapse:collapse;}
.card td{padding:5px 0;}
.card td:first-child{color:var(--muted); width:88px; vertical-align:top;}
.card td:last-child{text-align:right; word-break:break-all;}
.mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;}
.divi{border-top:1px solid var(--border); margin:8px 0; padding-top:8px;}
.total td{font-weight:600; font-size:16px;}
.hintline{font-size:12px; color:var(--hint); margin:4px 0 0;}
.msg{font-size:13px; margin:0;}
.chips{display:flex; gap:6px; flex-wrap:wrap; margin:6px 0 0;}
.chips button{font-size:13px; padding:4px 10px; border-radius:999px;}
.btnrow{display:flex; gap:8px; margin-top:14px;}
.btnrow .grow{flex:1;}
.section-label{font-size:14px; font-weight:600; color:var(--muted); margin:16px 0 10px; padding-top:12px; border-top:1px solid var(--border);}
#ubn-hint{color:var(--danger); font-size:12px; display:none; margin-top:4px;}
#copy-msg{font-size:13px; color:var(--accent); text-align:center; margin:8px 0 0; visibility:hidden;}
footer{margin-top:32px; font-size:12px; color:var(--hint); text-align:center;}
</style>
</head>
<body>
<div class="wrap">
<h1>發票名目產生器</h1>

<div class="step">
  <div class="steprow">
    <div>
      <p class="t">第一步：跟對方要資訊</p>
      <p class="d">複製訊息傳給對方</p>
    </div>
    <button id="btn-ask">📋 複製索取訊息</button>
  </div>
</div>

<div class="step">
  <p class="t">第二步：貼上對方回覆，自動填入</p>
  <p class="d" style="margin-bottom:8px;">表格式或口語訊息都可以，品名會依內容自動判斷（版稅／通告費／公關費／演講費／服務費）</p>
  <textarea id="paste-box" rows="4" placeholder="公司抬頭：××股份有限公司
統編：12345678
金額：含稅$33,600
電話：02-1234-5678 #100"></textarea>
  <div style="display:flex; gap:8px; margin-top:8px; align-items:center; flex-wrap:wrap;">
    <button id="btn-paste-read">📥 一鍵貼上並解析</button>
    <button id="btn-parse">✨ 解析填入</button>
    <span id="parse-msg" class="msg"></span>
  </div>
</div>

<div class="grid">
  <div>
    <div class="field">
      <label for="inv-date">日期</label>
      <input type="date" id="inv-date">
    </div>
    <div class="field">
      <label for="inv-company">公司抬頭</label>
      <input type="text" id="inv-company" placeholder="例：××股份有限公司">
    </div>
    <div class="field">
      <label for="inv-ubn">統一編號（8 碼）</label>
      <input type="text" id="inv-ubn" inputmode="numeric" maxlength="8" placeholder="例：12345678">
      <div id="ubn-hint">統編需為 8 位數字</div>
    </div>
    <div class="field">
      <label for="inv-item">項目名稱（品名）</label>
      <input type="text" id="inv-item" value="合作推廣費">
      <div class="chips" id="item-chips"></div>
      <p class="hintline">解析時會依訊息內容自動判斷，也可點按鈕快速切換</p>
    </div>
    <div class="field">
      <label for="inv-amount">金額</label>
      <div style="display:flex; gap:8px;">
        <input type="number" id="inv-amount" min="0" step="1" placeholder="0" style="flex:1;">
        <select id="inv-mode" style="width:130px;">
          <option value="net">未稅金額</option>
          <option value="gross">含稅總額</option>
        </select>
      </div>
      <p class="hintline">選「含稅總額」會自動回推未稅與稅金（稅率 5%）</p>
    </div>

    <p class="section-label">📮 收件資訊</p>
    <div class="field">
      <label for="inv-addr">郵寄地址</label>
      <input type="text" id="inv-addr" placeholder="例：台北市××區××路 100 號 5 樓">
    </div>
    <div class="field">
      <label for="inv-recipient">收件人</label>
      <input type="text" id="inv-recipient" placeholder="例：王小明">
    </div>
    <div class="field">
      <label for="inv-phone">電話</label>
      <input type="tel" id="inv-phone" placeholder="例：02-1234-5678 #100">
    </div>
    <div class="field">
      <label for="inv-note">備註（隨發票附寄項目、分潤後續另計等）</label>
      <textarea id="inv-note" rows="2" placeholder="例：附高鐵票收據；10% 分潤結算後另開"></textarea>
    </div>
  </div>

  <div class="card">
    <h2>🧾 發票名目</h2>
    <table>
      <tr><td>日期</td><td id="out-date">—</td></tr>
      <tr><td>公司抬頭</td><td id="out-company">—</td></tr>
      <tr><td>統一編號</td><td class="mono" id="out-ubn">—</td></tr>
      <tr><td>項目名稱</td><td id="out-item">合作推廣費</td></tr>
    </table>
    <div class="divi">
      <table>
        <tr><td>未稅金額</td><td class="mono" id="out-net">NT$ 0</td></tr>
        <tr><td>稅金（5%）</td><td class="mono" id="out-tax">NT$ 0</td></tr>
        <tr class="total"><td>總金額</td><td class="mono" id="out-total">NT$ 0</td></tr>
      </table>
    </div>
    <div class="divi">
      <table>
        <tr><td>郵寄地址</td><td id="out-addr">—</td></tr>
        <tr><td>收件人</td><td id="out-recipient">—</td></tr>
        <tr><td>電話</td><td class="mono" id="out-phone">—</td></tr>
        <tr><td>備註</td><td id="out-note" style="white-space:pre-wrap;">—</td></tr>
      </table>
    </div>
    <div class="btnrow">
      <button id="btn-copy" class="primary grow">📋 複製發票名目</button>
      <button id="btn-clear" aria-label="清除全部欄位" title="清除全部欄位">↻</button>
    </div>
    <p id="copy-msg">已複製到剪貼簿</p>
  </div>
</div>

<footer>純前端運算，所有資料只留在你的瀏覽器，不會上傳任何伺服器。<br>© 富足診所</footer>
</div>

<script>
const $ = id => document.getElementById(id);
const fmt = n => 'NT$ ' + Math.round(n).toLocaleString('zh-TW');
const DEFAULT_ITEM = '合作推廣費';
const fields = ['inv-date','inv-company','inv-ubn','inv-item','inv-amount','inv-mode','inv-addr','inv-recipient','inv-phone','inv-note'];

const ASK_TEXT = [
  '哈囉，要幫您開發票了 🙂',
  '麻煩照下面格式填寫回傳，我們收到後當天就能安排開立寄出：',
  '',
  '公司抬頭：',
  '統編：',
  '品名（未填則依合作內容開立）：',
  '金額（未稅或含稅擇一填寫，請註明）：',
  '希望開立日期（未填則收到當天開立）：',
  '寄送地址：',
  '收件人：',
  '電話：'
].join('\n');

const ITEM_RULES = [
  { name: '版稅', words: ['版稅','印量','再刷','新書','出版','書籍定價','入庫','上市'] },
  { name: '通告費', words: ['通告','錄影','錄音','上節目','節目','podcast','Podcast','直播來賓'] },
  { name: '公關費', words: ['公關','媒體曝光','新聞報導','業配','記者會'] },
  { name: '演講費', words: ['演講','講座','授課','課程','講師'] },
  { name: '服務費', words: ['服務費','顧問','諮詢','咨詢'] }
];
const ITEM_CHIPS = ['合作推廣費','版稅','通告費','公關費','演講費','服務費'];

function detectItem(text) {
  const invoicePart = text.split(/收件資訊|寄送資訊|郵寄資訊/)[0];
  for (const rule of ITEM_RULES) {
    if (rule.words.some(w => invoicePart.includes(w))) return rule.name;
  }
  return null;
}

const chipsBox = $('item-chips');
ITEM_CHIPS.forEach(name => {
  const b = document.createElement('button');
  b.textContent = name;
  b.addEventListener('click', () => { $('inv-item').value = name; render(); });
  chipsBox.appendChild(b);
});

function calc() {
  const amt = parseFloat($('inv-amount').value) || 0;
  let net, tax, total;
  if ($('inv-mode').value === 'gross') {
    total = Math.round(amt);
    net = Math.round(total / 1.05);
    tax = total - net;
  } else {
    net = Math.round(amt);
    tax = Math.round(net * 0.05);
    total = net + tax;
  }
  return { net, tax, total };
}

function rocDate(iso) {
  if (!iso) return '';
  const [y, m, d] = iso.split('-').map(Number);
  return iso + '（民國 ' + (y - 1911) + ' 年 ' + m + ' 月 ' + d + ' 日）';
}

function render() {
  const { net, tax, total } = calc();
  $('out-date').textContent = $('inv-date').value || '—';
  $('out-company').textContent = $('inv-company').value.trim() || '—';
  const ubn = $('inv-ubn').value.trim();
  $('out-ubn').textContent = ubn || '—';
  $('ubn-hint').style.display = (ubn && !/^\d{8}$/.test(ubn)) ? 'block' : 'none';
  $('out-item').textContent = $('inv-item').value.trim() || DEFAULT_ITEM;
  $('out-net').textContent = fmt(net);
  $('out-tax').textContent = fmt(tax);
  $('out-total').textContent = fmt(total);
  $('out-addr').textContent = $('inv-addr').value.trim() || '—';
  $('out-recipient').textContent = $('inv-recipient').value.trim() || '—';
  $('out-phone').textContent = $('inv-phone').value.trim() || '—';
  $('out-note').textContent = $('inv-note').value.trim() || '—';
}

fields.forEach(id => $(id).addEventListener('input', render));
$('inv-mode').addEventListener('change', render);

const today = new Date();
$('inv-date').value = today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0') + '-' + String(today.getDate()).padStart(2,'0');

function parseDateStr(s) {
  let m = s.match(/(\d{3,4})\s*[\/\-年\.]\s*(\d{1,2})\s*[\/\-月\.]\s*(\d{1,2})/);
  if (m) {
    let y = +m[1];
    if (y < 1911) y += 1911;
    return y + '-' + String(+m[2]).padStart(2,'0') + '-' + String(+m[3]).padStart(2,'0');
  }
  m = s.match(/(\d{1,2})\s*[\/月]\s*(\d{1,2})/);
  if (m) {
    return today.getFullYear() + '-' + String(+m[1]).padStart(2,'0') + '-' + String(+m[2]).padStart(2,'0');
  }
  return null;
}

const numRe = '([\\d][\\d,;，]*(?:\\.\\d+)?)';
function pickNum(s) { return parseFloat(s.replace(/[,;，]/g, '')); }

function parseAmountLine(line) {
  const mulM = line.match(new RegExp(numRe + '\\s*[*×]\\s*1\\.05\\s*=?\\s*' + numRe));
  if (mulM) {
    const net = pickNum(mulM[1]), gross = pickNum(mulM[2]);
    return { amount: net, mode: 'net', gross: gross, crossCheck: Math.abs(net * 1.05 - gross) <= 1 };
  }
  const netM = line.match(new RegExp(numRe + '\\s*元?\\s*[\\(（]?\\s*未稅'));
  const grossM = line.match(new RegExp(numRe + '\\s*元?\\s*[\\(（]?\\s*含稅'));
  let result = null;
  if (netM) result = { amount: pickNum(netM[1]), mode: 'net' };
  else if (grossM) result = { amount: pickNum(grossM[1]), mode: 'gross' };
  else {
    const netPre = line.match(new RegExp('未稅[^0-9]{0,8}' + numRe));
    const grossPre = line.match(new RegExp('含稅[^0-9]{0,8}' + numRe));
    if (grossPre && !netPre) result = { amount: pickNum(grossPre[1]), mode: 'gross' };
    else if (netPre && !grossPre) result = { amount: pickNum(netPre[1]), mode: 'net' };
    else {
      const anyM = line.match(new RegExp(numRe));
      if (anyM) {
        let mode = null;
        if (/含稅/.test(line) && !/未稅/.test(line)) mode = 'gross';
        else if (/未稅/.test(line) && !/含稅/.test(line)) mode = 'net';
        result = { amount: pickNum(anyM[1]), mode: mode };
      }
    }
  }
  if (!result) return null;
  if (netM && grossM) {
    const net = pickNum(netM[1]), gross = pickNum(grossM[1]);
    result.crossCheck = Math.abs(net * 1.05 - gross) <= 1;
    result.gross = gross;
  }
  return result;
}

function parseReply(text) {
  const lines = text.split(/\r?\n/);
  let filled = 0;
  let warn = '';
  let itemInfo = '';
  let section = 'invoice';
  let amountDone = false;
  const got = {};
  const simpleMap = [
    { keys: ['公司抬頭','公司名稱','抬頭','買受人'], id: 'inv-company', sec: 'invoice' },
    { keys: ['統一編號','統編'], id: 'inv-ubn', clean: v => (v.match(/\d{8}/) || [v.replace(/\D/g,'')])[0] },
    { keys: ['品名','項目名稱','項目','名目'], id: 'inv-item' },
    { keys: ['郵寄地址','寄送地址','公司地址','收件地址','地址'], id: 'inv-addr' },
    { keys: ['收件人','收件者'], id: 'inv-recipient' },
    { keys: ['聯絡電話','電話','手機'], id: 'inv-phone' }
  ];
  for (const raw of lines) {
    const line = raw.trim();
    if (!line) continue;
    if (/收件資訊|寄送資訊|郵寄資訊/.test(line)) { section = 'ship'; continue; }
    if (/發票資訊/.test(line)) { section = 'invoice'; continue; }
    if (!amountDone && (line.includes('金額') || ((/未稅|含稅/.test(line)) && /\d/.test(line) && !/^\d+\s*[\.、]/.test(line)))) {
      let target = line;
      const lm = line.match(/^[^:：]*金額[^:：]*[:：]\s*(.+)$/);
      if (lm) target = lm[1];
      const a = parseAmountLine(target);
      if (a && a.amount > 0) {
        $('inv-amount').value = a.amount;
        if (a.mode) $('inv-mode').value = a.mode;
        filled++;
        amountDone = true;
        got['inv-amount'] = true;
        if (a.crossCheck === false) {
          warn = '注意：對方提供的未稅與含稅金額不一致（未稅 ×1.05 ≠ 含稅 ' + a.gross.toLocaleString() + '），已採用未稅金額，請向對方確認';
        }
      }
    }
    const m = line.match(/^(.+?)\s*[:：]\s*(.+)$/);
    if (!m) continue;
    const label = m[1];
    const value = m[2].trim();
    if (!value) continue;
    if (label.includes('日期')) {
      const d = parseDateStr(value);
      if (d) { $('inv-date').value = d; filled++; }
      continue;
    }
    if (label.includes('金額') || label.includes('未稅') || label.includes('含稅')) continue;
    for (const f of simpleMap) {
      if (f.keys.some(k => label.includes(k))) {
        if (f.sec && f.sec !== section) break;
        const v = f.clean ? f.clean(value) : value;
        if (v) { $(f.id).value = v; filled++; got[f.id] = true; }
        break;
      }
    }
  }
  if (!got['inv-company']) {
    let m = text.match(/(?:公司抬頭|抬頭|公司名稱)[為是]?\s*[:：]?\s*([^\n，。；:：]{2,40}?)(?=\s{2,}|統一編號|統編|\n|，|。|；|$)/);
    if (!m) m = text.match(/(?:^|[\s,，、])([一-鿿A-Za-z0-9]{2,30}(?:股份有限公司|有限公司))/m);
    if (m && m[1].trim()) { $('inv-company').value = m[1].trim(); filled++; }
  }
  if (!got['inv-ubn']) {
    const m = text.match(/(?:統一編號|統編)[為是]?\s*[:：]?\s*(\d{8})/);
    if (m) { $('inv-ubn').value = m[1]; filled++; }
  }
  if (!got['inv-phone']) {
    const m = text.match(/(?:聯絡電話|電話|手機)[為是]?\s*[:：]?\s*([0-9][0-9()\-#＃ \t]{6,})/);
    if (m) { $('inv-phone').value = m[1].trim(); filled++; }
  }
  if (!got['inv-item']) {
    const detected = detectItem(text);
    if (detected) {
      $('inv-item').value = detected;
      filled++;
      itemInfo = '品名依內容判斷為「' + detected + '」';
    } else {
      $('inv-item').value = DEFAULT_ITEM;
    }
  }
  render();
  return { filled, warn, itemInfo };
}

function showParseResult(r) {
  const msg = $('parse-msg');
  if (r.warn) {
    msg.textContent = r.warn;
    msg.style.color = 'var(--warn)';
  } else if (r.filled > 0) {
    msg.textContent = '已自動填入 ' + r.filled + ' 個欄位' + (r.itemInfo ? '，' + r.itemInfo : '') + '，請核對下方表單';
    msg.style.color = 'var(--accent)';
  } else {
    msg.textContent = '沒有解析到欄位，請確認內容包含抬頭、統編或金額等資訊';
    msg.style.color = 'var(--danger)';
  }
}

$('btn-parse').addEventListener('click', () => {
  showParseResult(parseReply($('paste-box').value));
});

$('btn-paste-read').addEventListener('click', async () => {
  try {
    const text = await navigator.clipboard.readText();
    if (!text) throw new Error('empty');
    $('paste-box').value = text;
    showParseResult(parseReply(text));
  } catch (e) {
    const msg = $('parse-msg');
    msg.textContent = '無法讀取剪貼簿，請直接在上方框內貼上後按「解析填入」';
    msg.style.color = 'var(--warn)';
    $('paste-box').focus();
  }
});

$('paste-box').addEventListener('paste', () => {
  setTimeout(() => showParseResult(parseReply($('paste-box').value)), 50);
});

function copyText(text, btn) {
  const done = () => {
    const msg = $('copy-msg');
    msg.style.visibility = 'visible';
    setTimeout(() => { msg.style.visibility = 'hidden'; }, 2000);
    if (btn) {
      const orig = btn.textContent;
      btn.textContent = '✓ 已複製';
      setTimeout(() => { btn.textContent = orig; }, 2000);
    }
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(done).catch(() => fallbackCopy(text, done));
  } else {
    fallbackCopy(text, done);
  }
}

function fallbackCopy(text, done) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'absolute';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand('copy'); done(); } catch (e) {}
  document.body.removeChild(ta);
}

$('btn-ask').addEventListener('click', function() { copyText(ASK_TEXT, this); });

$('btn-copy').addEventListener('click', function() {
  const { net, tax, total } = calc();
  const lines = [
    '日期：' + rocDate($('inv-date').value),
    '公司抬頭：' + $('inv-company').value.trim(),
    '統一編號：' + $('inv-ubn').value.trim(),
    '項目名稱：' + ($('inv-item').value.trim() || DEFAULT_ITEM),
    '未稅金額：' + fmt(net),
    '稅金（5%）：' + fmt(tax),
    '總金額：' + fmt(total),
    '',
    '收件資訊',
    '郵寄地址：' + $('inv-addr').value.trim(),
    '收件人：' + $('inv-recipient').value.trim(),
    '電話：' + $('inv-phone').value.trim()
  ];
  const note = $('inv-note').value.trim();
  if (note) lines.push('備註：' + note);
  copyText(lines.join('\n'), this);
});

$('btn-clear').addEventListener('click', () => {
  ['inv-company','inv-ubn','inv-amount','inv-addr','inv-recipient','inv-phone','inv-note','paste-box'].forEach(id => $(id).value = '');
  $('inv-item').value = DEFAULT_ITEM;
  $('parse-msg').textContent = '';
  render();
});

render();
</script>
</body>
</html>
